name: Build

on:
  release:
    types: [published]
  push:
    branches: [main]

jobs:
  build:
    name: Build luci-app-wifimgr
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build package
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: aarch64_cortex-a53-24.10
          FEEDNAME: wifimgr
          PACKAGES: luci-app-wifimgr
          NO_REFRESH_CHECK: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-wifimgr
          path: bin/packages/**/luci-app-wifimgr*.{apk,ipk}

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg=$(find bin/packages -name 'luci-app-wifimgr*.apk' 2>/dev/null | head -1)
          [ -z "$pkg" ] && pkg=$(find bin/packages -name 'luci-app-wifimgr*.ipk' 2>/dev/null | head -1)
          gh release upload "${{ github.ref_name }}" "$pkg" --clobber
